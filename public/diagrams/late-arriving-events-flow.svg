<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Late arriving events reconciliation flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FBFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="100" x2="1104" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="652" rx="28" fill="#FFFFFF" fill-opacity="0.84" stroke="#C6D4E6"/>

  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Late Arriving Event Flow</text>
  <text x="60" y="116" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">when the attempt arrives first, the pipeline must hold it</text>
  <text x="60" y="142" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">until the missing business context becomes available</text>

  <g filter="url(#shadow)">
    <rect x="80" y="180" width="220" height="110" rx="22" fill="#FEE2E2" stroke="#E8B7B7"/>
    <text x="118" y="224" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">AssignmentAttempt</text>
    <text x="118" y="256" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="15">triggering business event</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="360" width="220" height="110" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="150" y="404" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Assignment</text>
    <text x="112" y="430" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="15">assignment context</text>
    <text x="112" y="454" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="15">may arrive late</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="80" y="540" width="220" height="110" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="126" y="584" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">SectionLearner</text>
    <text x="102" y="610" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="15">learner relationship</text>
    <text x="102" y="634" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="15">may also be late</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="410" y="272" width="290" height="180" rx="24" fill="#FFF6D7" stroke="#E6D594"/>
    <text x="468" y="320" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Resolve dependencies</text>
    <text x="454" y="356" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">join attempt with</text>
    <text x="454" y="382" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">assignment and learner</text>
    <text x="454" y="412" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">if either side is missing,</text>
    <text x="454" y="438" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">do not promote yet</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="250" width="290" height="140" rx="24" fill="#F4EDFF" stroke="#CDC0EC"/>
    <text x="876" y="298" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Reconciliation store</text>
    <text x="856" y="330" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">keep unresolved events</text>
    <text x="856" y="356" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">safely visible</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="450" width="290" height="140" rx="24" fill="#E8FFF3" stroke="#B7E2CC"/>
    <text x="874" y="498" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Curated output</text>
    <text x="854" y="530" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">promote only after</text>
    <text x="854" y="556" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">both joins succeed</text>
  </g>

  <path d="M300 235H390" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M390 235L373 225M390 235L373 245" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M300 415H390" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M300 595H390" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>

  <path d="M700 340H800" stroke="#D97706" stroke-width="6" stroke-linecap="round"/>
  <path d="M800 340L783 330M800 340L783 350" stroke="#D97706" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="714" y="316" fill="#B45309" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">missing dependency</text>

  <path d="M700 420C754 420 778 420 820 520" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M820 520L807 502M820 520L799 511" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="702" y="462" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">all required context found</text>
</svg>
