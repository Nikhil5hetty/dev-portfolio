  <rect x="875" y="255" width="250" height="90" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="902" y="299" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Admin reporting</text>

  <rect x="875" y="370" width="250" height="90" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="914" y="414" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Class ranking view</text>

  <text x="80" y="390" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Implementation highlights</text>
  <text x="80" y="426" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">clean the source tables, join them once, then build metric tables that can feed dashboards</text>
