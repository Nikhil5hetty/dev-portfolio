  </defs>
  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="512" rx="28" fill="#FFFFFF" fill-opacity="0.82" stroke="#C6D4E6"/>
  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Spark Teacher Analytics</text>
  <text x="60" y="118" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">teacher scorecards, assignment summaries, and class rankings</text>

  <rect x="60" y="180" width="155" height="110" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="94" y="223" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Students</text>
  <text x="98" y="251" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">roster + status</text>

  <rect x="60" y="310" width="155" height="110" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="84" y="353" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Assignments</text>
  <text x="96" y="381" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">class + scores</text>

  <rect x="60" y="440" width="155" height="0" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>

