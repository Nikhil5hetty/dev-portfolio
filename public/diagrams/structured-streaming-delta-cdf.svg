<svg width="1200" height="620" viewBox="0 0 1200 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Structured Streaming and Delta CDF system diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="110" y1="120" x2="1090" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="572" rx="28" fill="#FFFFFF" fill-opacity="0.82" stroke="#C6D4E6"/>

  <text x="60" y="80" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Structured Streaming + Delta CDF</text>
  <text x="60" y="114" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">incremental change capture, checkpointed processing, and target table updates</text>

  <g filter="url(#shadow)">
    <rect x="60" y="180" width="180" height="115" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="92" y="224" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Source Delta</text>
    <text x="112" y="251" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">raw table</text>
    <text x="80" y="276" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">inserts / updates / deletes</text>
  </g>

  <path d="M248 237H325" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M325 237L308 227M325 237L308 247" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="340" y="160" width="220" height="155" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="372" y="204" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Delta CDF</text>
    <text x="374" y="232" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">captures row-level changes</text>
    <text x="374" y="258" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">commit version / change type</text>
    <text x="374" y="284" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">incremental read surface</text>
  </g>

  <path d="M570 237H647" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M647 237L630 227M647 237L630 247" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="662" y="160" width="220" height="155" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="688" y="204" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Structured</text>
    <text x="688" y="233" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Streaming</text>
    <text x="688" y="260" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">checkpointed micro-batches</text>
    <text x="688" y="286" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">stateful incremental processing</text>
  </g>

  <path d="M892 237H969" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M969 237L952 227M969 237L952 247" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="984" y="140" width="156" height="70" rx="20" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="1016" y="183" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Target</text>

    <rect x="984" y="235" width="156" height="70" rx="20" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="1006" y="278" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Merge</text>

    <rect x="984" y="330" width="156" height="70" rx="20" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="1013" y="373" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Checkpoint</text>
  </g>

  <path d="M1062 210V235" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1062 235L1052 220M1062 235L1072 220" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M1062 305V330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M1062 330L1052 315M1062 330L1072 315" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="60" y="470" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">What the pipeline proves</text>
  <text x="60" y="506" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">Only the changes move through the stream, and the target table stays current without full reloads.</text>
  <text x="60" y="538" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">The checkpoint lets the job resume safely after failure while keeping the incremental state intact.</text>
</svg>
