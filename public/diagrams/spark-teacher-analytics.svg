  <text x="304" y="264" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Enriched Fact Table</text>
  <text x="294" y="294" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">clean joins and canonical class_id</text>
  <text x="300" y="318" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">submission status + timing</text>
  <text x="302" y="342" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">score and pass/fail flags</text>

