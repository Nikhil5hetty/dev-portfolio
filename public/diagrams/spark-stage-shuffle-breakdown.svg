<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spark stages, tasks, and shuffle breakdown">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="120" x2="1120" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="672" rx="28" fill="#FFFFFF" fill-opacity="0.84" stroke="#C6D4E6"/>

  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Jobs, Stages, Tasks, and Shuffle</text>
  <text x="60" y="116" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">narrow transformations stay in one stage, but wide transformations create a shuffle boundary</text>

  <g filter="url(#shadow)">
    <rect x="70" y="176" width="1040" height="110" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="104" y="222" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Job: enrich clickstream and aggregate by customer</text>
    <text x="104" y="256" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="17">one action triggers one job, but Spark splits it into stages around shuffle barriers</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="340" width="410" height="240" rx="24" fill="#E8FFF3" stroke="#B7E2CC"/>
    <text x="104" y="390" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Stage 1</text>
    <text x="104" y="422" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">scan, filter, select, withColumn</text>
    <text x="104" y="454" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">tasks run on existing partitions</text>
    <rect x="104" y="490" width="92" height="56" rx="16" fill="#FFFFFF" stroke="#B7E2CC"/>
    <rect x="214" y="490" width="92" height="56" rx="16" fill="#FFFFFF" stroke="#B7E2CC"/>
    <rect x="324" y="490" width="92" height="56" rx="16" fill="#FFFFFF" stroke="#B7E2CC"/>
    <text x="128" y="524" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Task 1</text>
    <text x="238" y="524" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Task 2</text>
    <text x="348" y="524" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Task 3</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="340" width="390" height="240" rx="24" fill="#FFF2D8" stroke="#E6D594"/>
    <text x="754" y="390" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Stage 2</text>
    <text x="754" y="422" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">join, aggregate, write output</text>
    <text x="754" y="454" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">tasks consume shuffled partitions</text>
    <rect x="754" y="490" width="92" height="56" rx="16" fill="#FFFFFF" stroke="#E6D594"/>
    <rect x="864" y="490" width="92" height="56" rx="16" fill="#FFFFFF" stroke="#E6D594"/>
    <rect x="974" y="490" width="92" height="56" rx="16" fill="#FFFFFF" stroke="#E6D594"/>
    <text x="778" y="524" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Task A</text>
    <text x="888" y="524" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Task B</text>
    <text x="998" y="524" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Task C</text>
  </g>

  <path d="M480 460H720" stroke="#D97706" stroke-width="8" stroke-dasharray="16 16" stroke-linecap="round"/>
  <path d="M720 460L700 448M720 460L700 472" stroke="#D97706" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="528" y="432" fill="#B45309" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Shuffle boundary</text>
  <text x="504" y="606" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">wide transformation means repartition by a join key</text>
  <text x="504" y="632" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">or aggregate key before the next stage can start</text>

  <path d="M210 286V330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M210 330L199 312M210 330L221 312" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M920 286V330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M920 330L909 312M920 330L931 312" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
