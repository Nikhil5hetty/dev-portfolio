<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reconciliation retry loop diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="120" x2="1104" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="632" rx="28" fill="#FFFFFF" fill-opacity="0.84" stroke="#C6D4E6"/>

  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Retry Loop for Reconciliation</text>
  <text x="60" y="116" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">the unresolved event is not dropped</text>
  <text x="60" y="142" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">it is checked again until the missing records arrive</text>

  <g filter="url(#shadow)">
    <rect x="120" y="260" width="210" height="120" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="152" y="308" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Unresolved event</text>
    <text x="164" y="340" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">attempt stored safely</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="220" width="260" height="180" rx="24" fill="#FFF6D7" stroke="#E6D594"/>
    <text x="544" y="268" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Retry job</text>
    <text x="514" y="304" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">periodic scan of the</text>
    <text x="514" y="330" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">unresolved set</text>
    <text x="514" y="360" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">re-run the join checks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="110" width="210" height="120" rx="24" fill="#E8FFF3" stroke="#B7E2CC"/>
    <text x="912" y="158" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Resolved</text>
    <text x="914" y="190" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">promote downstream</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="870" y="420" width="210" height="120" rx="24" fill="#FEE2E2" stroke="#E8B7B7"/>
    <text x="934" y="468" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700">Still missing</text>
    <text x="910" y="500" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">keep it in recon store</text>
  </g>

  <path d="M330 320H450" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M450 320L433 310M450 320L433 330" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M730 310H850V190" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M850 190L839 207M850 190L861 207" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="758" y="280" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">dependencies available</text>

  <path d="M730 340H850V480" stroke="#D97706" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M850 480L839 463M850 480L861 463" stroke="#D97706" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="756" y="408" fill="#B45309" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">dependencies still missing</text>

  <path d="M975 540V584C975 610 952 620 912 620H280C242 620 225 602 225 566V390" stroke="#6B7280" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M225 390L214 407M225 390L236 407" stroke="#6B7280" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="460" y="646" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">loop until the missing record arrives</text>
  <text x="460" y="670" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">then move the event forward</text>
</svg>
