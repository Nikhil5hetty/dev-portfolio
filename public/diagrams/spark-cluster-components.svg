<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spark cluster components and execution flow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="128" x2="1104" y2="628" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="720" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="672" rx="28" fill="#FFFFFF" fill-opacity="0.84" stroke="#C6D4E6"/>

  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Spark Cluster Components</text>
  <text x="60" y="116" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">the driver plans work, the cluster manager allocates resources, and executors run partitioned tasks</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="250" height="160" rx="24" fill="#E8F1FF" stroke="#B7CCE8"/>
    <text x="144" y="216" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Driver</text>
    <text x="98" y="252" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">builds the execution plan</text>
    <text x="98" y="282" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">creates jobs, stages, and tasks</text>
    <text x="98" y="312" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">tracks progress and metrics</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="170" width="260" height="160" rx="24" fill="#E8FFF3" stroke="#B7E2CC"/>
    <text x="510" y="216" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Cluster Manager</text>
    <text x="500" y="252" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">YARN, Kubernetes, or Standalone</text>
    <text x="500" y="282" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">assigns CPU and memory</text>
    <text x="500" y="312" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">launches executors</text>
  </g>

  <path d="M320 250H450" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M450 250L432 239M450 250L432 261" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="140" y="420" width="250" height="170" rx="24" fill="#FFF6D7" stroke="#E6D594"/>
    <text x="202" y="466" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Executor 1</text>
    <text x="176" y="502" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">runs tasks for partition set A</text>
    <text x="176" y="532" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">holds cache and shuffle blocks</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="475" y="420" width="250" height="170" rx="24" fill="#FFF6D7" stroke="#E6D594"/>
    <text x="537" y="466" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Executor 2</text>
    <text x="511" y="502" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">runs tasks for partition set B</text>
    <text x="511" y="532" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">writes intermediate output</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="810" y="420" width="250" height="170" rx="24" fill="#FFF6D7" stroke="#E6D594"/>
    <text x="872" y="466" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Executor 3</text>
    <text x="846" y="502" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">runs tasks for partition set C</text>
    <text x="846" y="532" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">can retry failed work elsewhere</text>
  </g>

  <path d="M600 330V392" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M600 392L589 374M600 392L611 374" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M600 392H265" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M600 392H600" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M600 392H935" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>

  <path d="M265 392V420" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M600 392V420" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M935 392V420" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="870" y="170" width="250" height="160" rx="24" fill="#F4EDFF" stroke="#CDC0EC"/>
    <text x="944" y="216" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Storage</text>
    <text x="906" y="252" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">S3, ADLS, HDFS, Delta tables</text>
    <text x="906" y="282" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">partitions are read in parallel</text>
    <text x="906" y="312" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">results are written back here</text>
  </g>

  <path d="M730 250H850" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M850 250L832 239M850 250L832 261" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="60" y="646" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Beginner takeaway</text>
  <text x="60" y="680" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">One Spark application is a coordinated system, not a single machine doing all the work.</text>
</svg>
