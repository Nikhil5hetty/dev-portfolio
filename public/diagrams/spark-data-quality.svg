<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spark Data Quality architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#F0F7FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="80" x2="1080" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="560" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="512" rx="28" fill="#FFFFFF" fill-opacity="0.82" stroke="#C6D4E6"/>
  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Spark Data Quality</text>
  <text x="60" y="118" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">validation rules, profiling, and cleaned outputs</text>

  <rect x="60" y="175" width="210" height="112" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="100" y="220" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Raw Submissions</text>
  <text x="90" y="251" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">messy, duplicate, mixed types</text>

  <path d="M284 231H349" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M349 231L332 221M349 231L332 241" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="365" y="155" width="250" height="150" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="400" y="198" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Typed DataFrame</text>
  <text x="396" y="228" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">trim fields</text>
  <text x="396" y="252" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">cast scores and timestamps</text>
  <text x="396" y="276" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">normalize submission status</text>

  <path d="M636 231H701" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M701 231L684 221M701 231L684 241" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="720" y="120" width="165" height="90" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="757" y="166" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Report</text>

  <rect x="720" y="235" width="165" height="90" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="754" y="281" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700">Cleaned</text>

  <path d="M802 210V235" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M802 235L792 220M802 235L812 220" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="915" y="120" width="220" height="90" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="947" y="164" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Missing values</text>

  <rect x="915" y="235" width="220" height="90" rx="22" fill="#F6FAFF" stroke="#B9CBE4"/>
  <text x="949" y="279" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Invalid scores</text>

  <path d="M830 210H915" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8"/>
  <path d="M830 325H915" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8"/>

  <text x="80" y="392" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Implementation highlights</text>
  <text x="80" y="428" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">clean first, report issues separately, and keep the cleaned frame ready for downstream jobs</text>
</svg>
