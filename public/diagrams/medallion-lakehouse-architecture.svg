<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Medallion lakehouse architecture diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF5FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="110" x2="1104" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0369A1"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="700" rx="34" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="652" rx="28" fill="#FFFFFF" fill-opacity="0.84" stroke="#C6D4E6"/>

  <text x="60" y="82" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="700">Medallion Architecture on a Lakehouse</text>
  <text x="60" y="116" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">the same platform holds raw, curated, and business-ready data without copying every workload into a separate system</text>

  <g filter="url(#shadow)">
    <rect x="60" y="260" width="170" height="140" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="110" y="314" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Sources</text>
    <text x="90" y="346" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">apps, files, events, APIs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="300" y="220" width="210" height="220" rx="24" fill="#FFF2D8" stroke="#E6D594"/>
    <text x="362" y="276" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Bronze</text>
    <text x="336" y="316" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">raw landing</text>
    <text x="336" y="346" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">append-first history</text>
    <text x="336" y="376" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">replay and recovery point</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="540" y="220" width="210" height="220" rx="24" fill="#E8FFF3" stroke="#B7E2CC"/>
    <text x="610" y="276" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Silver</text>
    <text x="576" y="316" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">clean, cast, dedupe</text>
    <text x="576" y="346" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">standard business keys</text>
    <text x="576" y="376" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">trusted reusable data</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="780" y="220" width="210" height="220" rx="24" fill="#F4EDFF" stroke="#CDC0EC"/>
    <text x="858" y="276" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700">Gold</text>
    <text x="816" y="316" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">metrics and dimensions</text>
    <text x="816" y="346" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">features and dashboards</text>
    <text x="816" y="376" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">product-facing outputs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="990" y="260" width="150" height="140" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="1026" y="314" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Consumers</text>
    <text x="1016" y="346" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="16">BI, ML, APIs, apps</text>
  </g>

  <path d="M230 330H282" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M282 330L265 320M282 330L265 340" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M510 330H522" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M522 330L505 320M522 330L505 340" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M750 330H762" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M762 330L745 320M762 330L745 340" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M990 330H972" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M990 330L973 320M990 330L973 340" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="290" y="500" width="690" height="110" rx="24" fill="#F6FAFF" stroke="#B9CBE4"/>
    <text x="332" y="544" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Lakehouse platform</text>
    <text x="332" y="576" fill="#5D6B82" font-family="Inter, Arial, sans-serif" font-size="18">shared storage, ACID tables, batch plus streaming, one governance model, fewer duplicate data copies</text>
  </g>
</svg>
